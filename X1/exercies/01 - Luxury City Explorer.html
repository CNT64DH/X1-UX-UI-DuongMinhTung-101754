<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 01 - Luxury City Explorer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="luxury-theme">

  <div class="app-container">
    <header class="top-header d-flex justify-content-between align-items-center py-4 px-3 px-md-4">
      <h1 class="logo-title m-0">City Explorer</h1>
      <button class="btn btn-outline-gold rounded-pill px-4" type="button">Search</button>
    </header>

    <main class="main-content px-3 px-md-4 pb-5">
      <section class="welcome-section mb-5 position-relative overflow-hidden rounded-4">
        <img src="../assets/images/01/01.png" alt="Luxury Restaurant" class="welcome-bg w-100 object-fit-cover">
        <div class="welcome-overlay d-flex flex-column justify-content-end p-4">
          <h2 class="text-white">Welcome Back</h2>
          <p class="text-light mb-0">Plan your exclusive weekend in one tap.</p>
        </div>
      </section>

      <section class="places-section">
        <div class="d-flex justify-content-between align-items-end mb-4">
          <h2 class="section-title m-0">Exclusive Places</h2>
        </div>

        <div class="row g-4">
          <article class="col-12 col-md-6 col-lg-4">
            <div class="place-card h-100">
              <img src="../assets/images/01/02.png" alt="Old Town Market" class="card-img">
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div>
                  <h3 class="card-title">Gourmet Market</h3>
                  <p class="card-desc">Fine dining & crafts</p>
                </div>
                <button class="btn btn-gold btn-sm rounded-pill text-uppercase" type="button">View</button>
              </div>
            </div>
          </article>

          <article class="col-12 col-md-6 col-lg-4">
            <div class="place-card h-100">
              <img src="../assets/images/01/03.png" alt="River Walk" class="card-img">
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div>
                  <h3 class="card-title">Marina Walk</h3>
                  <p class="card-desc">Private morning trail</p>
                </div>
                <button class="btn btn-gold btn-sm rounded-pill text-uppercase" type="button">View</button>
              </div>
            </div>
          </article>

          <article class="col-12 col-md-6 col-lg-4">
            <div class="place-card h-100">
              <img src="../assets/images/01/04.png" alt="Art Street" class="card-img">
              <div class="card-body p-3 d-flex justify-content-between align-items-center">
                <div>
                  <h3 class="card-title">Gallery Street</h3>
                  <p class="card-desc">VIP weekend events</p>
                </div>
                <button class="btn btn-gold btn-sm rounded-pill text-uppercase" type="button">View</button>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <nav class="bottom-nav d-flex justify-content-around py-3 bg-white shadow-lg">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Map</a>
      <a href="#" class="nav-link">Saved</a>
      <a href="#" class="nav-link">Profile</a>
    </nav>
  </div>

</body>

</html>
