<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 05 - Elite Client Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="luxury-theme">

  <div class="app-container">
    <header class="top-header d-flex justify-content-center align-items-center py-4 px-3">
      <h1 class="logo-title m-0 font-heading text-dark">Client Profile</h1>
    </header>

    <main class="main-content px-3 px-md-4 pb-5 font-body">
      <form>

        <section class="place-card p-4 mb-4 border-0 shadow-sm">
          <h2 class="section-title fs-5 mb-4 text-gold font-heading">Personal Details</h2>

          <div class="mb-3">
            <label for="fullName" class="form-label text-muted small text-uppercase fw-bold tracking-wide">Full
              Name</label>
            <input id="fullName" type="text" class="form-control luxury-input" placeholder="e.g. John Doe" />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label text-muted small text-uppercase fw-bold tracking-wide">Email</label>
            <input id="email" type="email" class="form-control luxury-input" placeholder="e.g. john@example.com" />
          </div>

          <div class="mb-2">
            <label for="language" class="form-label text-muted small text-uppercase fw-bold tracking-wide">Preferred
              Language</label>
            <select id="language" class="form-select luxury-input">
              <option>English</option>
              <option>Vietnamese</option>
              <option>French</option>
            </select>
          </div>
        </section>

        <section class="place-card p-4 mb-4 border-0 shadow-sm">
          <h2 class="section-title fs-5 mb-4 text-gold font-heading">Experience & Communication</h2>

          <div class="mb-3">
            <label class="form-check form-switch d-flex align-items-center gap-2 p-0">
              <input class="form-check-input m-0 custom-switch" type="checkbox" role="switch" checked />
              <span class="ms-2 text-dark fw-bold">Exclusive Invitations</span>
            </label>
          </div>

          <div class="mb-4">
            <label class="form-check form-switch d-flex align-items-center gap-2 p-0">
              <input class="form-check-input m-0 custom-switch" type="checkbox" role="switch" />
              <span class="ms-2 text-dark fw-bold">Boutique News & Offers</span>
            </label>
          </div>

          <div>
            <label for="theme" class="form-label text-muted small text-uppercase fw-bold tracking-wide">Interface
              Aesthetic</label>
            <select id="theme" class="form-select luxury-input">
              <option>Light Theme</option>
              <option>Dark Theme</option>
              <option>System Default</option>
            </select>
          </div>
        </section>

        <section class="place-card p-4 mb-4 border-0 shadow-sm">
          <h2 class="section-title fs-5 mb-3 text-gold font-heading">Account Security</h2>
          <div class="d-flex flex-column gap-3 mt-3">
            <button type="button"
              class="btn btn-outline-gold rounded-pill py-2 text-uppercase tracking-wide small">Change Password</button>
            <button type="button"
              class="btn btn-outline-gold rounded-pill py-2 text-uppercase tracking-wide small">Enable 2-Factor
              Auth</button>
          </div>
        </section>

        <section class="d-flex gap-3 mt-4 mb-5">
          <button type="button"
            class="btn btn-light rounded-pill flex-grow-1 py-3 fw-bold text-uppercase tracking-wide small border">Cancel</button>
          <button type="submit"
            class="btn btn-gold rounded-pill flex-grow-1 py-3 fw-bold text-uppercase tracking-wide small">Update
            Profile</button>
        </section>

      </form>
    </main>
  </div>

</body>

</html>
