<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 04 - Secure Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="luxury-theme">

  <div class="app-container">
    <header class="top-header d-flex justify-content-between align-items-center py-4 px-3 px-md-4">
      <h1 class="logo-title m-0 font-heading">Secure Checkout</h1>
      <a href="#" class="nav-link text-uppercase text-muted small fw-bold tracking-wide">Back</a>
    </header>

    <main class="main-content px-3 px-md-4 pb-5 mb-5 font-body">

      <section class="place-card p-4 mb-4 border-0 shadow-sm">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h2 class="card-desc text-uppercase small fw-bold mb-2">Shipping Destination</h2>
            <p class="fs-6 fw-bold mb-1 text-dark">The Grand Penthouse</p>
            <p class="card-desc mb-0">123 Vinhomes Marina, HongBang, HaiPhong</p>
          </div>
          <button class="btn btn-outline-gold btn-sm rounded-pill text-uppercase" type="button">Change</button>
        </div>
      </section>

      <section class="mb-4">
        <h2 class="section-title mb-3 fs-5 font-heading text-dark">Your Selection</h2>

        <article class="place-card p-3 mb-3 d-flex justify-content-between align-items-center border-0 shadow-sm">
          <div class="d-flex align-items-center gap-3">
            <img src="../assets/images/04/01.png" alt="Onyx Earbuds" class="course-thumb">
            <div>
              <h3 class="card-title fs-6 font-heading mb-1">Onyx Wireless Earbuds</h3>
              <p class="card-desc mb-0">Qty: 1</p>
            </div>
          </div>
          <span class="fw-bold fs-5 text-gold">$299</span>
        </article>

        <article class="place-card p-3 d-flex justify-content-between align-items-center border-0 shadow-sm">
          <div class="d-flex align-items-center gap-3">
            <img src="../assets/images/04/02.png" alt="Leather Dock" class="course-thumb">
            <div>
              <h3 class="card-title fs-6 font-heading mb-1">Leather Charging Dock</h3>
              <p class="card-desc mb-0">Qty: 2</p>
            </div>
          </div>
          <span class="fw-bold fs-5 text-gold">$150</span>
        </article>
      </section>

      <section class="place-card p-4 mb-4 border-0 shadow-sm">
        <h2 class="card-desc text-uppercase small fw-bold mb-3">Payment Method</h2>
        <form class="d-flex flex-column gap-3">
          <label class="form-check p-3 border rounded-3 luxury-input d-flex align-items-center m-0">
            <input class="form-check-input m-0 me-3 custom-switch" type="radio" name="pay" checked />
            <span class="fw-bold text-dark">Black Card / Credit</span>
          </label>

          <label class="form-check p-3 border rounded-3 luxury-input d-flex align-items-center m-0">
            <input class="form-check-input m-0 me-3 custom-switch" type="radio" name="pay" />
            <span class="fw-bold text-dark">Digital Wallet</span>
          </label>

          <label class="form-check p-3 border rounded-3 luxury-input d-flex align-items-center m-0">
            <input class="form-check-input m-0 me-3 custom-switch" type="radio" name="pay" />
            <span class="fw-bold text-dark">Pay on Delivery</span>
          </label>
        </form>
      </section>
    </main>

    <footer
      class="bottom-nav d-flex justify-content-between align-items-center px-4 py-3 bg-white border-top shadow-sm font-body"
      style="position: fixed; bottom: 0; width: 100%; z-index: 1000;">
      <div>
        <p class="mb-0 card-desc text-uppercase small fw-bold">Total Amount</p>
        <p class="mb-0 fw-bold fs-3 font-heading text-dark">$599</p>
      </div>
      <button class="btn btn-gold px-4 py-3 rounded-pill text-uppercase tracking-wide fw-bold" type="button">Confirm
        Purchase</button>
    </footer>
  </div>

</body>

</html>
